name: chinese_learning_app
description: HSK Chinese learning app — Light Liquid Glass UI
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Database
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Preferences
  shared_preferences: ^2.2.3

  # Audio
  just_audio: ^0.9.39
  just_audio_windows: ^0.2.0
  flutter_tts: ^4.0.2

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/content/blocks.json
    - assets/content/topics/
    - assets/content/words/
    - assets/content/strokes/
    - assets/audio/words/
    - assets/audio/sfx/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC/NotoSansSC-Bold.ttf
          weight: 700